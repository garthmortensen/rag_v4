<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Pipeline</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232734;
    --border: #2e3345;
    --text: #e4e6ef;
    --muted: #8b8fa3;
    --accent: #6c8aff;
    --accent-hover: #8aa2ff;
    --green: #4ade80;
    --red: #f87171;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }

  /* ── Buttons ────────────────────────────────── */
  .btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: var(--border); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Main layout ────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Chat panel ─────────────────────────────── */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 12px;
  }
  .empty-state svg { width: 48px; height: 48px; opacity: 0.4; }
  .empty-state p { font-size: 15px; }

  .msg {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    padding: 16px 20px;
    border-radius: var(--radius);
    line-height: 1.65;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-user {
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .msg-assistant {
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .msg-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    color: var(--muted);
  }
  .msg-user .msg-label { color: var(--accent); }
  .msg-assistant .msg-label { color: var(--green); }
  .msg-sources {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .msg-sources summary {
    cursor: pointer;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .msg-sources .source-item {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .msg-sources .source-item:last-child { border-bottom: none; }
  .source-title { color: var(--accent); font-weight: 500; }
  .source-score { color: var(--muted); font-size: 11px; margin-left: 6px; }

  /* ── Input area ─────────────────────────────── */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .input-row {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
  }
  #question {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 46px;
    max-height: 200px;
  }
  #question::placeholder { color: var(--muted); }
  #question:focus { border-color: var(--accent); }

  /* ── Upload modal ───────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 460px;
    max-width: 90vw;
  }
  .modal h2 {
    font-size: 16px;
    margin-bottom: 16px;
  }
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 16px;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(108,138,255,0.05);
  }
  .drop-zone input { display: none; }
  .file-list {
    margin-bottom: 16px;
    font-size: 13px;
    max-height: 120px;
    overflow-y: auto;
  }
  .file-list div {
    padding: 4px 0;
    display: flex;
    justify-content: space-between;
  }
  .file-list .remove {
    color: var(--red);
    cursor: pointer;
    font-size: 12px;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* ── Toast ──────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .toast-success { background: #16532d; color: var(--green); border: 1px solid #22663a; }
  .toast-error { background: #531616; color: var(--red); border: 1px solid #662222; }

  /* ── Spinner ────────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    <span>RAG</span> Pipeline
  </h1>
  <div class="header-actions">
    <button class="btn" id="uploadBtn">Upload Files</button>
  </div>
</header>

<main>
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>Ask a question about your documents</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="question" placeholder="Ask a question…" rows="1"></textarea>
        <button class="btn btn-primary" id="sendBtn">Send</button>
      </div>
    </div>
  </div>
</main>

<!-- Upload Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Upload Documents</h2>
    <div class="drop-zone" id="dropZone">
      <p>Drop files here or click to browse</p>
      <p style="font-size:12px;margin-top:6px;">PDF, TXT, MD, RST supported</p>
      <input type="file" id="fileInput" multiple>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="modal-actions">
      <button class="btn" id="cancelUpload">Cancel</button>
      <button class="btn btn-primary" id="doUpload" disabled>Upload</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const messagesEl  = document.getElementById('messages');
const emptyState  = document.getElementById('emptyState');
const questionEl  = document.getElementById('question');
const sendBtn     = document.getElementById('sendBtn');
const uploadBtn   = document.getElementById('uploadBtn');
const modalOverlay = document.getElementById('modalOverlay');
const dropZone    = document.getElementById('dropZone');
const fileInput   = document.getElementById('fileInput');
const fileListEl  = document.getElementById('fileList');
const cancelBtn   = document.getElementById('cancelUpload');
const doUploadBtn = document.getElementById('doUpload');
const toastEl     = document.getElementById('toast');

let pendingFiles = [];
let isQuerying = false;

// ── Chat ──────────────────────────────────────────

function addMessage(role, text, sources) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  const label = role === 'user' ? 'You' : 'Assistant';
  let html = `<div class="msg-label">${label}</div><div class="msg-text">${escapeHtml(text)}</div>`;
  if (sources && sources.length) {
    html += `<details class="msg-sources"><summary>Sources (${sources.length})</summary>`;
    for (const s of sources) {
      html += `<div class="source-item"><span class="source-title">${escapeHtml(s.title)}</span><span class="source-score">score: ${s.score}</span><br><small>${escapeHtml(s.text)}</small></div>`;
    }
    html += '</details>';
  }
  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function sendQuery() {
  const q = questionEl.value.trim();
  if (!q || isQuerying) return;

  isQuerying = true;
  sendBtn.disabled = true;
  questionEl.value = '';
  questionEl.style.height = 'auto';

  addMessage('user', q);

  // Create streaming assistant message
  const assistantDiv = addMessage('assistant', '');
  const textEl = assistantDiv.querySelector('.msg-text');
  textEl.innerHTML = '<span class="spinner"></span> Thinking…';

  try {
    const resp = await fetch('/api/query/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      textEl.textContent = `Error: ${err}`;
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    textEl.textContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      fullText += decoder.decode(value, { stream: true });
      textEl.textContent = fullText;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Fetch sources separately (non-streaming query for metadata)
    try {
      const srcResp = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });
      if (srcResp.ok) {
        const data = await srcResp.json();
        if (data.sources && data.sources.length) {
          let srcHtml = `<details class="msg-sources"><summary>Sources (${data.sources.length})</summary>`;
          for (const s of data.sources) {
            srcHtml += `<div class="source-item"><span class="source-title">${escapeHtml(s.title)}</span><span class="source-score">score: ${s.score}</span><br><small>${escapeHtml(s.text)}</small></div>`;
          }
          srcHtml += '</details>';
          assistantDiv.insertAdjacentHTML('beforeend', srcHtml);
        }
      }
    } catch (_) { /* sources are a nice-to-have */ }

  } catch (err) {
    textEl.textContent = `Network error: ${err.message}`;
  } finally {
    isQuerying = false;
    sendBtn.disabled = false;
    questionEl.focus();
  }
}

sendBtn.addEventListener('click', sendQuery);
questionEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuery();
  }
});
// Auto-resize textarea
questionEl.addEventListener('input', () => {
  questionEl.style.height = 'auto';
  questionEl.style.height = Math.min(questionEl.scrollHeight, 200) + 'px';
});

// ── Upload Modal ──────────────────────────────────

uploadBtn.addEventListener('click', () => {
  pendingFiles = [];
  renderFileList();
  modalOverlay.classList.add('active');
});
cancelBtn.addEventListener('click', () => modalOverlay.classList.remove('active'));
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) modalOverlay.classList.remove('active');
});

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

function addFiles(fileListObj) {
  for (const f of fileListObj) pendingFiles.push(f);
  renderFileList();
}

function renderFileList() {
  fileListEl.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const d = document.createElement('div');
    d.innerHTML = `<span>${escapeHtml(f.name)} <small style="color:var(--muted)">(${(f.size / 1024).toFixed(1)} KB)</small></span><span class="remove" data-i="${i}">remove</span>`;
    fileListEl.appendChild(d);
  });
  doUploadBtn.disabled = pendingFiles.length === 0;
  fileListEl.querySelectorAll('.remove').forEach(el => {
    el.addEventListener('click', () => {
      pendingFiles.splice(+el.dataset.i, 1);
      renderFileList();
    });
  });
}

doUploadBtn.addEventListener('click', async () => {
  if (!pendingFiles.length) return;
  doUploadBtn.disabled = true;
  doUploadBtn.textContent = 'Uploading…';

  const fd = new FormData();
  for (const f of pendingFiles) fd.append('files', f);

  try {
    const resp = await fetch('/api/ingest', { method: 'POST', body: fd });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      showToast(err.detail || 'Upload failed', 'error');
      return;
    }
    const data = await resp.json();
    showToast(`Ingested ${data.chunks} chunk(s) from ${data.files} file(s)`, 'success');
    modalOverlay.classList.remove('active');
  } catch (err) {
    showToast(`Network error: ${err.message}`, 'error');
  } finally {
    doUploadBtn.disabled = false;
    doUploadBtn.textContent = 'Upload';
  }
});

function showToast(msg, type) {
  toastEl.textContent = msg;
  toastEl.className = `toast toast-${type} show`;
  setTimeout(() => toastEl.classList.remove('show'), 4000);
}
</script>
</body>
</html>
