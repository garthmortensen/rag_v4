# Flashcard-derived benchmark queries with ground-truth references.
# Converted from flashcards.csv.
# question  →  question
# answer    →  reference
# source    →  comment

- question: >-
    Under the expected loss approach, what three components are used to
    estimate expected loan losses?
  # general_federal_register_enhanced_transparency_and_public_accountability.html
  # (§ Loan Losses and Provisions on Loans Measured at Amortized Cost)
  reference: >-
    The supervisory stress test models estimate expected loan losses by
    projecting the probability of default (PD), loss given default (LGD),
    and exposure at default (EAD).

- question: >-
    What is the primary function of the operational-risk loss model in
    the supervisory stress test?
  # general_stress_test_npr_comment_letter_feb_20_2026.pdf (p. 66)
  reference: >-
    The model estimates potential operational losses over a hypothetical
    stress scenario using a nine-quarter time horizon.

- question: >-
    Why does the Federal Reserve model operational risk losses separately
    from pre-provision net revenue (PPNR)?
  # general_stress_test_npr_comment_letter_feb_20_2026.pdf (p. 66)
  reference: >-
    The Board models them separately because operational risk losses tend
    to exhibit distinct characteristics from other noninterest expense
    components.

- question: >-
    What specific types of events are captured by the Operational Risk
    Model?
  # general_stress_test_npr_comment_letter_feb_20_2026.pdf (p. 66)
  reference: >-
    The model captures losses from events such as fraud, computer system
    failures, process errors, and lawsuits by employees, customers, or
    other parties.

- question: >-
    What is the time horizon for the projection of net income and capital
    components?
  # general_stress_test_npr_comment_letter_feb_20_2026.pdf (p. 70)
  reference: >-
    The Federal Reserve projects these components over a nine-quarter
    projection horizon.

- question: >-
    What notable update will be made to the Fair Value Option model for
    the 2026 stress test?
  # methodology_2026_stress_test_methodology.pdf (p. 2)
  reference: >-
    The model will be adjusted to adopt lower loss given default (LGD)
    and loan-equivalent-factor (LEQ) assumptions, including a constant
    LGD of 50 percent.

- question: >-
    How will the compensation model be enhanced in the 2026 supervisory
    stress test?
  # methodology_2026_stress_test_methodology.pdf (p. 3)
  reference: >-
    The model will fully implement an enhancement that conditions
    projections of compensation expenses on the share of compensation
    paid in commissions and stocks.

- question: >-
    What is the 'constant balance sheet assumption' used by the Board in
    its projections?
  # proposed_stress_test_model_documentation_aggregation_models.pdf (p. 10)
  reference: >-
    The Board generally projects that a firm takes actions to maintain
    its current level of assets, including its securities, trading
    assets, and loans, over the projection horizon.

- question: >-
    What is the 'look-ahead period' mentioned in the aggregation model
    documentation?
  # proposed_stress_test_model_documentation_aggregation_models.pdf (p. 15)
  reference: >-
    It is an assumption used for calculating allowances for loan and
    lease losses over the projection horizon.

- question: >-
    What is the 'Projections Calculator' in the aggregation framework?
  # proposed_stress_test_model_documentation_aggregation_models.pdf (p. 6)
  reference: >-
    It is the tool used to calculate aggregated balances which are then
    multiplied by loss rates and growth ratios to determine stress test
    projections.

- question: >-
    How is the national aggregate building stock constructed in the
    Corporate Model?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 110)
  reference: >-
    The aggregate is constructed as a weighted average across individual
    markets, where weights are the size of the market as measured in
    square feet of the building stock.

- question: >-
    How are seasonal adjustments for the Corporate Model independent
    variables obtained?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 110)
  reference: >-
    The Board seasonally adjusts each of the time series provided by the
    vendor according to the X11 procedure.

- question: >-
    How is the 'weighted average' calculated for market size in square
    feet in the Corporate Model?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 110)
  reference: >-
    The national aggregate is constructed by weighting individual markets
    by the size of their building stock in square feet.

- question: >-
    How does the Board handle newly originated loans in its constant
    balance sheet projections?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 360)
  reference: >-
    Newly originated loans are assumed to be unseasoned (zero months on
    book) and in current status at the time of origination.

- question: >-
    What are the key cross-sectional and time-series inputs to the
    Corporate PD Model?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 16)
  reference: >-
    The key cross-sectional input is the obligor internal risk rating,
    while the key time-series input is the BBB spread.

- question: >-
    What is the significance of 'obligor internal risk rating' in the
    Corporate Model?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 16)
  reference: >-
    It is a holistic measure summarizing a wide range of hard and soft
    credit-relevant information used as a key cross-sectional input.

- question: >-
    Which regulatory report provides the granular position data used in
    the First Lien Mortgage Model?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 199)
  reference: >-
    Firms are required to report this granular data on the FR Y-14M,
    Schedule A (First Lien).

- question: >-
    How does the Board ensure that differences in credit classes are not
    driven by subjective determination?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 231)
  reference: >-
    The Board relies on credit class definitions based on observable loan
    characteristics rather than the determinations of individual
    servicers.

- question: >-
    In the context of retail credit models, what are payoff rates?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 239)
  reference: >-
    Payoff rates are the rates at which loans in a portfolio are
    projected to be paid off by the borrower.

- question: >-
    In the First Lien Mortgage Model, what does the PD model produce in
    addition to loss rates?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 268)
  reference: >-
    The PD model also produces rates at which loans are projected to
    payoff, known as payoff rates.

- question: >-
    Why does the Board choose a loan-level approach rather than an
    aggregate approach for retail portfolios?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 329)
  reference: >-
    A loan-level approach is chosen because an aggregate approach may
    struggle to capture important variation across firms in projecting
    default rates.

- question: >-
    What is the 'Retail Loss Aggregation' process in the retail credit
    risk models?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 361)
  reference: >-
    This process applies the projected loss and payoff rates to produce
    aggregate projections of the balance sheets of covered institutions.

- question: >-
    How does the Board handle missing or immaterial portfolios in the
    retail credit risk models?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 375)
  reference: >-
    The process is designed to be consistent with the Stress Testing
    Policy Statement, focusing on simplicity, consistency, and
    robustness.

- question: >-
    What type of model does the Credit Card PD Model use to project
    default rates?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 389)
  reference: >-
    The Credit Card PD Model uses a discrete-time hazard model to model
    the probability of an account defaulting in a given quarter.

- question: >-
    Why are competing outcomes like prepayment excluded from certain
    retail default models?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 529)
  reference: >-
    This choice simplifies the modeling framework by removing the need
    for additional specifications while still producing reasonable
    industry-level results.

- question: >-
    How is the 'International Cards Model' defined in the documentation?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 568)
  reference: >-
    It refers to the regression model used for international retail loan
    portfolios made up of credit cards.

- question: >-
    What are 'scalar models' in the context of retail credit risk?
  # proposed_stress_test_model_documentation_credit_risk_models.pdf (p. 570)
  reference: >-
    Scalar models are used to project loss rates for portfolios where
    limited historical loss information is available, ensuring
    consistency with the principle of conservatism.

- question: >-
    What is the rationale for using monthly data in some market risk
    models?
  # proposed_stress_test_model_documentation_market_risk_models.pdf (p. 115)
  reference: >-
    Monthly data helps avoid transient market microstructure noise while
    maintaining sufficient volume for stable estimates of stress events.

- question: >-
    Which event type accounts for the largest proportion (72.5%) of
    gross operational losses incurred between 2000 and 2022?
  # proposed_stress_test_model_documentation_operational_risk_model.pdf (p. 10)
  reference: >-
    Clients, Products, and Business Practices (CPBP) represents the
    largest share of total reported gross operational losses.

- question: >-
    Why does the Operational Risk Model estimate losses using gross
    amounts rather than losses net of recoveries?
  # proposed_stress_test_model_documentation_operational_risk_model.pdf (p. 11)
  reference: >-
    The Board uses gross amounts due to the lower chance of recovery
    during stressful periods and the uncertainty over when recoveries
    will materialize.

- question: >-
    What are 'idiosyncratic loss events' in operational risk?
  # proposed_stress_test_model_documentation_operational_risk_model.pdf (p. 19)
  reference: >-
    These are operational loss events that are specific to a single firm
    rather than being systemic or correlated across multiple firms.

- question: >-
    Why is revenue generally not used as the primary risk indicator for
    operational risk in the Board's model?
  # proposed_stress_test_model_documentation_operational_risk_model.pdf (p. 29)
  reference: >-
    Revenue is generally more volatile than asset size, and its
    volatility can be driven by factors with little association with
    operational risk, such as monetary policy.

- question: >-
    In the Operational Risk Model, what does the 'small-loss component
    model' project?
  # proposed_stress_test_model_documentation_operational_risk_model.pdf (p. 6)
  reference: >-
    It projects the portion of operational losses that are not covered
    by the primary distributional model.

- question: >-
    What is the primary objective of the distributional model in
    operational risk?
  # proposed_stress_test_model_documentation_operational_risk_model.pdf (p. 6)
  reference: >-
    The objective is to produce stressed operational loss projections
    that could be systemic, correlated across several firms, or specific
    to individual firms.

- question: >-
    What specific 2024 event is cited as an example of an operational
    loss caused by system outages?
  # proposed_stress_test_model_documentation_operational_risk_model.pdf (p. 7)
  reference: >-
    The document cites the widespread system outages caused by a faulty
    CrowdStrike update in 2024 as a relevant example.

- question: >-
    What does the Bayesian Information Criterion (BIC) measure according
    to the glossary?
  # proposed_stress_test_model_documentation_pre_provision_net_revenue_models.pdf (p. 17)
  reference: >-
    The BIC is a statistic used to measure a model's goodness of fit
    while accounting for its complexity.

- question: >-
    How is the 'Projected Interest Income Rate' handled in the PPNR
    model revisions?
  # proposed_stress_test_model_documentation_pre_provision_net_revenue_models.pdf (p. 4)
  reference: >-
    The documentation was revised to ensure consistent labeling and to
    specify that certain parameters are based on average rather than
    end-of-quarter values.

- question: How many components of PPNR does the Board model separately?
  # proposed_stress_test_model_documentation_pre_provision_net_revenue_models.pdf (p. 7)
  reference: The Board separately models 23 components of pre-provision net revenue.

- question: >-
    Why are capital-neutral items like goodwill impairment excluded from
    PPNR models?
  # proposed_stress_test_model_documentation_pre_provision_net_revenue_models.pdf (p. 7)
  reference: >-
    They are excluded because projecting capital-neutral flows would not
    impact stress testing outcomes.

- question: >-
    What does the term 'Autocorrelation' mean in the context of the
    supervisory stress test models?
  # proposed_stress_test_model_documentation_supervisory_stress_test_models_glossary.pdf (p. 1)
  reference: >-
    In a time series or panel data model, it refers to the correlation
    between the errors in different time periods.

- question: >-
    What is an 'Autoregressive process' according to the model glossary?
  # proposed_stress_test_model_documentation_supervisory_stress_test_models_glossary.pdf (p. 1)
  reference: >-
    It is a time series model whose current value depends linearly on
    one or more of its previous values plus an unpredictable disturbance.
