# RAG config file

[rag]

# --- Chunking ---
[rag.chunking]
chunk_size    = 1000
chunk_overlap = 100

# --- Storage ---
[rag.storage]
collection_name = "rag_docs"
vector_db_dir   = "corpus/vector_db"

# --- Embedder ---
# Options: "huggingface" (requires uv sync --extra hf)
[rag.embedder]
type  = "huggingface"
model = "all-MiniLM-L6-v2"

# --- LLM ---
# Provider: "ollama" | "openai" | "anthropic"
[rag.llm]
provider    = "openai"
model       = "gpt-4o-mini"
temperature = 0.01

# --- Retrieval ---
[rag.retrieval]
top_k = 10

# --- Ingestion ---
[rag.ingestion]
raw_data_dir = "corpus/raw_data"

# --- Evaluation ---
# Judge LLM for RAGAS faithfulness scoring.
# provider: "ollama" | "openai" | "anthropic"
[rag.evaluation]
enabled = true
provider = "openai"
model = "gpt-4o-mini"
