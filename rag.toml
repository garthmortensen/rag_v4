# RAG config file

[rag]

# --- Chunking ---
[rag.chunking]
chunk_size    = 500
chunk_overlap = 200


# --- Storage ---
[rag.storage]
vector_db_dir    = "corpus/vector_db"
collection_name  = "chunk_size_500_chunk_overlap_200"

# --- Embedder ---
# Options: "huggingface" (requires uv sync --extra hf)
[rag.embedder]
type  = "huggingface"
model = "all-MiniLM-L6-v2"

# --- LLM ---
# Provider: "ollama" | "openai" | "anthropic"
[rag.llm]
provider    = "openai"
model       = "gpt-4o-mini"
temperature = 0.01

# --- Retrieval ---
[rag.retrieval]
top_k = 10

# --- Ingestion ---
[rag.ingestion]
raw_data_dir = "corpus/raw_data"

# --- Evaluation ---
# Judge LLM for RAGAS faithfulness scoring.
# provider: "ollama" | "openai" | "anthropic"
[rag.evaluation]
enabled = true
provider = "openai"
model = "gpt-4o-mini"
